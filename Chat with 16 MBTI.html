            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;

        .version-tab:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

            background: rgba(255, 255, 255, 0.95);

            font-weight: 700;

            margin-bottom: 5px;

            color: #999;

        }

            border-radius: 3px;
        }

        .mbti-list::-webkit-scrollbar-thumb {
            background: #667eea;

            font-size: 0.75rem;
            opacity: 0.7;

        }

        // 调整颜色亮度
        function adjustColor(color, amount) {
            const clamp = (num) => Math.min(255, Math.max(0, num));
            const hex = color.replace('#', '');
            const r = clamp(parseInt(hex.substr(0, 2), 16) + amount);
            const g = clamp(parseInt(hex.substr(2, 2), 16) + amount);
            const b = clamp(parseInt(hex.substr(4, 2), 16) + amount);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // 从本地存储加载聊天记录
        function loadChatHistory() {
            const storedHistory = localStorage.getItem(`mbti_chat_${currentMBTI}`);
            if (storedHistory) {
                return JSON.parse(storedHistory);
            }
            return [];
        }

        // 保存聊天记录到本地存储
        function saveChatHistory() {
            const messages = [];
            chatMessages.querySelectorAll('.message').forEach(message => {
                const type = message.classList.contains('user') ? 'user' : message.classList.contains('ai') ? 'ai' : 'system';
                const content = message.querySelector('.message-content')?.textContent || '';
                if (content) {
                    messages.push({ type, content, time: message.querySelector('.message-time')?.textContent || '' });
                }
            });
            localStorage.setItem(`mbti_chat_${currentMBTI}`, JSON.stringify(messages));
        }
        
        // 为指定MBTI保存聊天记录
        function saveChatHistoryForMBTI(aiMessage, mbtiType) {
            // 检查消息是否为空
            if (!aiMessage || aiMessage.trim() === '') {
                return;
            }
            
            // 加载指定MBTI的现有聊天记录
            const storedHistory = localStorage.getItem(`mbti_chat_${mbtiType}`);
            let messages = [];
            if (storedHistory) {
                messages = JSON.parse(storedHistory);
            }
            
            // 添加新的AI消息
            messages.push({ 
                type: 'ai', 
                content: aiMessage, 
                time: getCurrentTime() 
            });
            
            // 保存回本地存储
            localStorage.setItem(`mbti_chat_${mbtiType}`, JSON.stringify(messages));
        }

        // 发送消息
        function sendMessage() {
            const message = inputField.value.trim();
            if (message) {
                addUserMessage(message);
                inputField.value = "";
                const loadingId = addLoadingMessage();
                
                // 记录当前的MBTI类型
                const currentMBTIType = currentMBTI;
                
                if (config.deepseekApiUrl) {
                    generateResponseWithDeepSeek(message, loadingId, currentMBTIType)
                        .catch(error => {
                            console.error('发送消息错误:', error);
                            // 降级到本地回复逻辑
                            setTimeout(() => {
                                const response = generateLocalResponse(message, currentMBTIType);
                                if (response && response.trim() !== '') {
                                    removeLoadingMessage(loadingId);
                                    addAIMessage(response, currentMBTIType);
                                    addSystemMessage('网络连接问题，已切换到本地回复模式。');
                                } else {
                                    removeLoadingMessage(loadingId);
                                }
                            }, 500);
                        });
                } else {
                    setTimeout(() => {
                        // 即使MBTI类型已改变，也要生成本地回复并添加到对应的MBTI聊天历史
                        const response = generateLocalResponse(message, currentMBTIType);
                        if (response && response.trim() !== '') {
                            removeLoadingMessage(loadingId);
                            addAIMessage(response, currentMBTIType);
                        } else {
                            removeLoadingMessage(loadingId);
                        }
                    }, 500);
                }
            }
        }

        // 使用 DeepSeek 生成回复
        async function generateResponseWithDeepSeek(message, loadingId, currentMBTIType) {
            try {
                // 根据当前版本选择不同的数据源
                const responses = currentVersion === 'normal' ? mbtiResponses : sbtiResponses;
                const mbti = responses[currentMBTIType];
                
                // 构建系统提示
                let systemPrompt;
                if (currentVersion === 'normal') {
                    systemPrompt = `你是 ${mbti.name} 人格类型（${mbti.title}），${mbti.description}。你的性格特点是：${mbti.traits}。请根据这些特点，以 ${mbti.name} 的身份回复用户的问题。`;
                } else {
                    // SBTI版本使用详细描述
                    systemPrompt = `你是 ${mbti.name} 人格类型（${mbti.title}），${mbti.description}。${mbti.detailedDescription || ''} 你的性格特点是：${mbti.traits}。请根据这些特点，以 ${mbti.name} 的身份回复用户的问题，要充分体现你的人格特征。`;
                }

                const response = await fetch(config.deepseekApiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            {
                                role: 'system',
                                content: systemPrompt
                            },
                            {
                                role: 'user',
                                content: message
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    }),
                    signal: AbortSignal.timeout(30000) // 30秒超时
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.log('DeepSeek API 错误响应:', errorData);
                    throw new Error(`API 调用失败: ${response.status} - ${errorData.error?.message || errorData.message || JSON.stringify(errorData) || '未知错误'}`);
                }

                const data = await response.json();
                console.log('DeepSeek API 响应:', data);
                
                if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content && data.choices[0].message.content.trim() !== '') {
                    const reply = data.choices[0].message.content;
                    removeLoadingMessage(loadingId);
                    // 即使MBTI类型已改变，也要添加回复到对应的MBTI聊天历史
                    addAIMessage(reply, currentMBTIType);
                } else {
                    removeLoadingMessage(loadingId);
                    throw new Error(`API 响应格式错误: ${JSON.stringify(data)}`);
                }
            } catch (error) {
                console.error('DeepSeek API 调用失败:', error);
                // 即使MBTI类型已改变，也要生成本地回复并添加到对应的MBTI聊天历史
                const fallbackResponse = generateLocalResponse(message, currentMBTIType);
                if (fallbackResponse && fallbackResponse.trim() !== '') {
                    removeLoadingMessage(loadingId);
                    addAIMessage(fallbackResponse, currentMBTIType);
                    // 只有在当前MBTI类型下才显示系统消息
                    if (currentMBTI === currentMBTIType) {
                        addSystemMessage(`DeepSeek API 调用失败: ${error.message}，已使用本地回复逻辑。`);
                    }
                } else {
                    removeLoadingMessage(loadingId);
                }
                // 抛出错误，让调用者知道API调用失败
                throw error;
            }
        }

        // 本地回复逻辑（作为备份）
        function generateLocalResponse(question, mbtiType = null) {
            // 使用指定的MBTI类型或当前MBTI类型
            const targetMBTI = mbtiType || currentMBTI;
            // 根据当前版本选择不同的数据源
            const responses = currentVersion === 'normal' ? mbtiResponses : sbtiResponses;
            const mbti = responses[targetMBTI];
            
            if (question.includes("你好") || question.includes("嗨") || question.includes("hello")) {
                return `你好！我是${mbti.name}。${mbti.description}。有什么我可以帮助你的吗？`;
            } else if (question.includes("你是谁") || question.includes("什么是") || question.includes("人格")) {
                return `我是${mbti.name}（${mbti.title}），${mbti.description}。我的性格特点包括：${mbti.traits}。`;
            } else if (question.includes("建议") || question.includes("意见") || question.includes("指导")) {
                return `作为${mbti.name}，我建议你：1. 认真分析问题 2. 考虑各种可能性 3. 根据你的价值观做出决策。`;
            } else if (question.includes("感情") || question.includes("情绪") || question.includes("感受")) {
                return `作为${mbti.name}，我理解你的感受。让我们从不同角度来分析这个问题...`;
            } else {
                return `作为${mbti.name}，我认为这个问题值得深入思考。让我从我的角度为你分析一下...`;
            }
        }

                return;
            }
            
            // 使用指定的MBTI类型或当前MBTI类型
            const mbtiType = targetMBTI || currentMBTI;

            const responses = currentVersion === 'normal' ? mbtiResponses : sbtiResponses;

            if (mbtiType === currentMBTI) {
                const messageElement = document.createElement("div");
                messageElement.className = "message ai";

                if (customAvatars[mbtiType]) {
                    avatarHTML = `<img src="${customAvatars[mbtiType]}" alt="${mbtiType}">`;
                } else {
                    avatarHTML = mbtiType;
                }
                
                messageElement.innerHTML = `

            });
        }

        // 滚动到底部
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 获取当前时间
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // 启动应用 - 确保DOM完全加载后再初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            // DOM已经加载完成
            init();
        }
    </script>
</body>
</html>
